name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Biome lint & format check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npx vitest run --coverage
        env:
          CI: 'true'

      - name: Upload coverage to Codacy
        if: always() && env.CODACY_PROJECT_TOKEN != ''
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r coverage/lcov.info

      - name: Run Codacy Trivy security scan
        if: always() && env.CODACY_API_TOKEN != ''
        env:
          CODACY_API_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          set -euo pipefail
          TRIVY_DB_REPOSITORY=ghcr.io/aquasecurity/trivy-db ./.codacy/cli.sh analyze -t trivy --format sarif -o /tmp/trivy-results.sarif
          if [ -f /tmp/trivy-results.sarif ]; then
            echo "Trivy scan complete: $(jq '[.runs[].results[]?] | length' /tmp/trivy-results.sarif) findings"
          fi

  # CodeRabbit runs automatically on PRs via the GitHub App.
  # Install the app at: https://github.com/apps/coderabbitai
  # Configuration: .coderabbit.yaml

